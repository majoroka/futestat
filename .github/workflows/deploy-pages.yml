name: Deploy Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FIXTURES_STORE_BRANCH: fixtures-data
  FIXTURES_STORE_DIR: .fixtures-store

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare fixtures store snapshot
        id: snapshot
        run: |
          rm -rf "$FIXTURES_STORE_DIR"

          if git ls-remote --exit-code --heads origin "$FIXTURES_STORE_BRANCH" >/dev/null 2>&1; then
            git fetch --no-tags origin "$FIXTURES_STORE_BRANCH"
            git worktree add --detach "$FIXTURES_STORE_DIR" "origin/$FIXTURES_STORE_BRANCH"
            echo "path=$FIXTURES_STORE_DIR/data/fixtures/latest.json" >> "$GITHUB_OUTPUT"
          else
            echo "path=data/fixtures/latest.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          FUTESTAT_SITE_SNAPSHOT_PATH: ${{ steps.snapshot.outputs.path }}
        run: npm run build:site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
